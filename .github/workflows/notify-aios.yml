name: Notify AIOS on Content Change

# Disabled after the GitHub org migration: the old alldevlo/aios-devlo
# repository no longer receives website sync events, and devlo-aios does not
# currently define a repository_dispatch listener for this event.
on:
  workflow_dispatch:

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout slack-notifier skill
        uses: actions/checkout@v6
        continue-on-error: true
        with:
          repository: devlollc/devlo-aios
          sparse-checkout: automations/skills/slack-notifier
          sparse-checkout-cone-mode: false
          path: .devlo-aios
          token: ${{ secrets.CROSS_REPO_READ_TOKEN }}

      - name: Explain disabled sync
        run: |
          echo "Website-to-AIOS repository_dispatch is disabled."
          echo "Re-enable only after devlo-aios owns a documented sync listener."

      - name: Slack alert on failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID || vars.SLACK_CHANNEL_ID }}
        run: |
          MESSAGE="devlo-website | devlo | notify-aios FAILED | run ${{ github.run_id }} | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ ! -x .devlo-aios/automations/skills/slack-notifier/scripts/slack_alert.sh ]; then
            echo "slack-notifier unavailable; using SLACK_FALLBACK_DIRECT_POST"
            PAYLOAD=$(jq -n --arg ch "$SLACK_CHANNEL_ID" --arg text ":rotating_light: $MESSAGE" '{channel:$ch, text:$text}')
            RESP=$(curl -sS -X POST https://slack.com/api/chat.postMessage \
              -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "$PAYLOAD")
            OK=$(printf '%s' "$RESP" | jq -r '.ok // false')
            if [ "$OK" != "true" ]; then
              printf '%s' "$RESP" | jq -c '{ok,error}'
              exit 4
            fi
            exit 0
          fi
          .devlo-aios/automations/skills/slack-notifier/scripts/slack_alert.sh \
            --level critical \
            --message "$MESSAGE"
